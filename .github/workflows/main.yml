name: Build APK Universal

on:
  push:
    paths:
      - '**/*.zip'  # Dispara sempre que um ZIP for enviado para qualquer lugar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # Encontra o arquivo zip mais recente na raiz
          ZIP_FILE=$(ls -t *.zip | head -n1)
          echo "Processando: $ZIP_FILE"
          
          # Cria pasta de build e descompacta
          mkdir -p build_dir
          unzip "$ZIP_FILE" -d build_dir
          
          # Entra na pasta (ajusta caso o zip crie subpastas extras)
          cd build_dir
          
          # Garante permissão do gradle
          chmod +x gradlew
          
          # Executa o build
          ./gradlew assembleDebug
          
          # Move o APK gerado para um local padrão
          cp app/build/outputs/apk/debug/*.apk ../app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-novo-app
          path: app-debug.apk
