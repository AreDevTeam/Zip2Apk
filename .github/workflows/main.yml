name: Build APK from ZIP
on:
  push:
    paths:
      - 'projeto.zip' # O workflow só roda quando você subir um arquivo com esse nome

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          unzip projeto.zip -d ./build_folder
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build with Gradle
        run: |
          cd ./build_folder
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-apk-final
          path: ./build_folder/app/build/outputs/apk/debug/*.apk
